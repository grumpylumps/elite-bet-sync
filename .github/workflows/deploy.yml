name: Deploy Sync Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Jest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elite_bet_sync
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: elite_bet_sync
      PORT: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: |
          DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}" \
            node migrations/run_migrations.js

      - name: Run tests
        run: npm test -- --forceExit

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/elite-bet-sync
            git pull origin main || git pull origin master
            npm ci --omit=dev
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/elite_bet_sync node migrations/run_migrations.js
            sudo systemctl restart elite-bet-sync

      - name: Verify health
        run: |
          sleep 5
          curl -sf https://sync.elitestatsbets.com/health \
            && echo "Health check passed" \
            || echo "Health check failed (service may still be warming up)"
